<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core">
<h:head>
    <title>Anmeldung - Like Hero To Zero</title>
    <h:outputStylesheet library="css" name="style.css"/>
</h:head>
<h:body>
    <div class="header">
        <a href="index.xhtml" class="logo">Like Hero To Zero</a>
        <h:link value="Zurück zur Startseite" outcome="index" class="nav-link" />
    </div>

    <div class="main-content">
        <div class="card login-container">
            <h2 class="card-title" style="text-align: center; margin-bottom: 2rem;">Wissenschaftler-Login</h2>
            
            <h:form id="loginForm">
                <h:panelGroup id="messagesPanel">
                    <h:messages globalOnly="true" styleClass="alert alert-danger" style="list-style-type: none; margin-bottom: 1.5rem; display: block;" />
                </h:panelGroup>

                <div class="form-group">
                    <h:outputLabel value="Benutzername" for="username" class="form-label" />
                    <h:inputText id="username" value="#{loginBean.username}" required="true" requiredMessage="Benutzername ist erforderlich." class="form-control" />
                    <h:message for="username" style="color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem; display: block;" />
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <h:outputLabel value="Passwort" for="password" class="form-label" />
                    <h:inputSecret id="password" value="#{loginBean.password}" required="true" requiredMessage="Passwort ist erforderlich." class="form-control" />
                    <h:message for="password" style="color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem; display: block;" />
                </div>

                <h:commandButton value="Einloggen" action="#{loginBean.login}" class="btn btn-primary" style="width: 100%;" />
            </h:form>
        </div>
    </div>

    <div class="footer">
    </div>
</h:body>
</html>
